<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Rifai - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <section id="profile" class="section active">
            <div class="profile-container">
                <div class="profile-image-container">
                    <img src="images/profile.jpg" alt="Muhammad Rifai" class="profile-pic">
                </div>
                <div class="profile-text">
                    <h1 id="profile-name">Memuat Nama...</h1>
                    <p id="profile-title" class="subtitle">Memuat Gelar...</p>
                    <p id="profile-about" class="description">Memuat deskripsi profil...</p>
                    
                    <div class="profile-info">
                        <div class="info-item">
                            <i class="fa-solid fa-envelope"></i>
                            <span id="profile-email">m.rifai.gbs@gmail.com</span>
                        </div>
                        <div class="info-item">
                            <i class="fa-solid fa-phone"></i>
                            <span id="profile-phone">+62 823-2706-3194</span>
                        </div>
                        <div class="info-item">
                            <i class="fa-solid fa-location-dot"></i>
                            <span id="profile-location">Kendal, Indonesia</span>
                        </div>
                    </div>

                    <div class="profile-actions" style="margin-top: 20px; display: flex; gap: 15px;">
                        <a href="https://www.linkedin.com/in/muhammad-rifai-5a24bb37a" target="_blank" class="btn btn-secondary">
                            <i class="fa-brands fa-linkedin"></i> LinkedIn
                        </a>
                        <a href="https://github.com/mrifaigbs-alt" target="_blank" class="btn btn-secondary">
                            <i class="fa-brands fa-github"></i> GitHub
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <section id="about" class="section">
            <h2><i class="fa-solid fa-user"></i> Tentang Saya</h2>
            <div class="skills-container">
                <h3><i class="fa-solid fa-brain"></i> Keahlian Utama</h3>
                <div id="skills-list" class="skills-grid">
                    </div>
            </div>
        </section>

        <section id="education" class="section">
            <h2><i class="fa-solid fa-graduation-cap"></i> Pendidikan</h2>
            <div id="education-list" class="timeline">
                </div>
        </section>

        <section id="experience" class="section">
            <h2><i class="fa-solid fa-briefcase"></i> Pengalaman</h2>
            <div id="experience-list" class="timeline">
                </div>
        </section>

        <section id="projects" class="section">
            <h2><i class="fa-solid fa-code"></i> Proyek</h2>
            <div id="projects-grid" class="projects-grid">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
