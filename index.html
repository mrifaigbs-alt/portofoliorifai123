<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Rifai - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="profile-card">
                <div class="profile-img-container">
                    <img src="images/profile.jpg" alt="Muhammad Rifai" class="profile-img">
                </div>
                <h1 id="profile-name">Memuat Nama...</h1>
                <p id="profile-title" class="title">Memuat Gelar...</p>
                
                <div class="contact-info">
                    <div class="contact-item">
                        <i class="fa-solid fa-envelope"></i>
                        <span id="profile-email">m.rifai.gbs@gmail.com</span>
                    </div>
                    <div class="contact-item">
                        <i class="fa-solid fa-phone"></i>
                        <span id="profile-phone">+62 823-2706-3194</span>
                    </div>
                    <div class="contact-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <span id="profile-location">Kendal, Indonesia</span>
                    </div>
                </div>

                <div class="social-links" style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
                    <a href="https://www.linkedin.com/in/muhammad-rifai-5a24bb37a" target="_blank" style="color: #00bcd4; text-decoration: none; font-size: 1.1em; padding: 6px 12px; border: 1px solid #00bcd4; border-radius: 4px; transition: 0.3s;">
                        <i class="fa-brands fa-linkedin"></i> LinkedIn
                    </a>
                    <a href="https://github.com/mrifaigbs-alt" target="_blank" style="color: #00bcd4; text-decoration: none; font-size: 1.1em; padding: 6px 12px; border: 1px solid #00bcd4; border-radius: 4px; transition: 0.3s;">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section id="about" class="card">
                <h2><i class="fa-solid fa-user"></i> Tentang Saya</h2>
                <p id="profile-about">Memuat deskripsi profil...</p>
            </section>

            <section id="education" class="card">
                <h2><i class="fa-solid fa-graduation-cap"></i> Pendidikan</h2>
                <div id="education-list">
                    </div>
            </section>

            <section id="experience" class="card">
                <h2><i class="fa-solid fa-briefcase"></i> Pengalaman</h2>
                <div id="experience-list">
                    </div>
            </section>

            <section id="projects" class="card">
                <h2><i class="fa-solid fa-code"></i> Proyek</h2>
                <div id="projects-grid" class="projects-grid">
                    </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
