<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Muhammad Rifai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="sidebar-nav">
        <ul>
            <li><a href="#profile" class="active" title="Profil"><i class="fas fa-user"></i></a></li>
            <li><a href="#education" title="Pendidikan"><i class="fas fa-graduation-cap"></i></a></li>
            <li><a href="#experience" title="Pengalaman"><i class="fas fa-briefcase"></i></a></li>
            <li><a href="#projects" title="Proyek"><i class="fas fa-microchip"></i></a></li>
        </ul>
    </nav>

    <main class="container">
        
        <section id="profile" class="section">
            <div class="profile-container">
                <div class="profile-image-container">
                    <img id="profile-pic" src="" alt="Foto Muhammad Rifai">
                    <br><br>
                    <a href="docs/CV Rifai.pdf" class="download-btn" download>
                        <i class="fas fa-download"></i> Unduh CV
                    </a>
                </div>
                <div class="profile-info">
                    <h1 id="profile-name">Memuat Nama...</h1>
                    <p class="profile-title">Teknik Elektronika </p>
                    <p id="profile-description">Memuat deskripsi profil...</p>
                    
                    <div class="contact-grid">
                        <div class="contact-item"><i class="fas fa-envelope"></i> <span id="profile-email">-</span></div>
                        <div class="contact-item"><i class="fas fa-phone"></i> <span id="profile-phone">-</span></div>
                        <div class="contact-item"><i class="fas fa-map-marker-alt"></i> <span id="profile-location">-</span></div>
                    </div>

                    <div class="contact-grid" style="margin-top: 10px; border-top: 1px dashed #00f2fe; padding-top: 10px;">
                        <div class="contact-item">
                            <i class="fa-brands fa-linkedin" style="color: #00f2fe;"></i> 
                            <a href="https://www.linkedin.com/in/muhammad-rifai-5a24bb37a" target="_blank" style="color: #fff; text-decoration: none;">Profil LinkedIn</a>
                        </div>
                        <div class="contact-item">
                            <i class="fa-brands fa-github" style="color: #00f2fe;"></i> 
                            <a href="https://github.com/mrifaigbs-alt" target="_blank" style="color: #fff; text-decoration: none;">Profil GitHub</a>
                        </div>
                    </div>

                    <div class="skills-container" style="margin-top: 20px;">
                        <h3><i class="fas fa-brain" style="color: #00f2fe; margin-right: 10px;"></i>Keterampilan</h3>
                        <div id="skills-grid" class="skills-grid">
                            </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="education" class="section">
            <h2>Riwayat Pendidikan</h2>
            <div id="education-list" class="education-list">
                </div>
        </section>

        <section id="experience" class="section">
            <h2>Pengalaman Kerja & Magang</h2>
            <div id="experience-list" class="experience-list">
                </div>
        </section>

        <section id="projects" class="section">
            <h2>Proyek Elektronika & IoT</h2>
            <div id="projects-grid" class="education-list">
                </div>
        </section>

        <footer>
            <p>&copy; <span id="current-year"></span> Muhammad Rifai. Hak Cipta Dilindungi.</p>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
